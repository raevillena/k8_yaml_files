apiVersion: v1
kind: ConfigMap
metadata:
  name: nberic-task-tracker-config
  namespace: default
data:
  # App
  NODE_ENV: "production"
  NEXT_PUBLIC_APP_URL: "https://ntt.nbericmmsu.com"
  NEXT_PUBLIC_SOCKET_URL: "https://ntt-chat.nbericmmsu.com"

  # External auth
  EXTERNAL_AUTH_API_URL: "https://umans-api.nbericmmsu.com"
  EXTERNAL_AUTH_APP_ID: "10"
  NEXT_PUBLIC_EXTERNAL_AUTH_APP_ID: "10"

  # File API / CDN (optional)
  NEXT_PUBLIC_FILE_API_URL: "https://files.nbericmmsu.com"
  NEXT_PUBLIC_CDN_URL: "https://cdn.nbericmmsu.com"

  # Socket server internal URL (server-to-server, inside cluster)
  SOCKET_SERVER_URL: "http://nberic-task-tracker-socket:3001"

  # DB — production: MariaDB on a separate VM. Use hostname or IP that is
  # reachable from the cluster pod network (firewall + MariaDB bind-address).
  # Password lives in Secret (see secret.example.yaml).
  DB_HOST: "10.10.30.102"
  DB_PORT: "3306"
  DB_NAME: "nberic_task_tracker"
  DB_USER: "nberic"
