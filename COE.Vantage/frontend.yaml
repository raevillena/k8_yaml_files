apiVersion: apps/v1
kind: Deployment
metadata:
  name: coe-vantage-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: coe-vantage-frontend
  template:
    metadata:
      labels:
        app: coe-vantage-frontend
    spec:
      containers:
        - name: frontend
          image: raevillena21/coe-vantage-frontend:v0.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: coe-vantage-frontend-service
  labels:
    app: coe-vantage-frontend
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
  selector:
    app: coe-vantage-frontend
