# COE.Vantage nginx reverse proxy (for external VM)
#
# Usage:
# - Replace K8S_NODE_IP with the IP of a node that exposes the NodePorts
# - Drop this file into /etc/nginx/conf.d/ (or include from nginx.conf)
# - Run certbot to attach TLS certificates to the HTTPS server blocks

upstream coe_vantage_frontend {
    server K8S_NODE_IP:30080;
}

upstream coe_vantage_backend {
    server K8S_NODE_IP:30081;
}

server {
    listen 80;
    server_name vantage.test.nbericmmsu.com;

    # After certbot, you can change this to a 301 redirect to HTTPS.
    location / {
        proxy_pass http://coe_vantage_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name vantage.api.nbericmmsu.com;

    # After certbot, you can change this to a 301 redirect to HTTPS.
    location / {
        proxy_pass http://coe_vantage_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

