apiVersion: apps/v1
kind: Deployment
metadata:
  name: coe-vantage-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: coe-vantage-backend
  template:
    metadata:
      labels:
        app: coe-vantage-backend
    spec:
      containers:
        - name: backend
          image: raevillena21/coe-vantage-backend:v0.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          envFrom:
            - configMapRef:
                name: coe-vantage-backend-config
            - secretRef:
                name: coe-vantage-backend-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: coe-vantage-backend-service
  labels:
    app: coe-vantage-backend
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 4000
      targetPort: 4000
      nodePort: 30081
      protocol: TCP
  selector:
    app: coe-vantage-backend
