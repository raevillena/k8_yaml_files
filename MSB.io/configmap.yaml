apiVersion: v1
kind: ConfigMap
metadata:
  name: file-api-config
  namespace: default
data:
  PORT: "3000"
  REDIS_HOST: "10.10.30.102"
  REDIS_PORT: "6379"
  MINIO_ENDPOINT: "10.10.30.10"
  MINIO_PORT: "9000"
